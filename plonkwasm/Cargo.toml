[package]
name = "plonkwasm"
version = "0.1.0"
edition = "2021"
license = "MPL-2.0"
description = "WebAssembly wrapper for dusk-plonk."

[dependencies]
dusk-bytes = "0.1"
dusk-plonk = { version = "=0.22.0", default-features = false, features = ["alloc"] }
rand_chacha = "0.3"
rand_core = "0.6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
