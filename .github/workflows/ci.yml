on:
  pull_request:
  push:
    branches: main

name: Continuous Integration

jobs:
  code-quality:
    name: Code quality
    uses: dusk-network/.github/.github/workflows/run-make.yml@main
    with:
      make_target: cq

  test-rust:
    name: Run Rust tests
    uses: dusk-network/.github/.github/workflows/run-make.yml@main
    with:
      make_target: test-rust

  test-wasm:
    name: Run WebAssembly tests
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
      - name: Install nightly Rust
        run: rustup toolchain install nightly --profile minimal --component rust-src --target wasm32-unknown-unknown
      - name: Install wasm-bindgen
        run: cargo install wasm-bindgen-cli --version 0.2.121 --locked
      - name: Run WebAssembly tests
        run: make test
