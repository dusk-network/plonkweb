<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PlonkWeb Browser Benchmark</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7f9;
        --surface: #ffffff;
        --text: #18202a;
        --muted: #647181;
        --line: #d8dee6;
        --accent: #0f766e;
        --accent-strong: #0b5f59;
        --danger: #b42318;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #11151a;
          --surface: #181e25;
          --text: #edf2f7;
          --muted: #a6b0bd;
          --line: #2e3742;
          --accent: #2dd4bf;
          --accent-strong: #5eead4;
          --danger: #f97066;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 40px auto;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.75rem, 4vw, 2.75rem);
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 20px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 160px)) minmax(180px, auto);
        gap: 12px;
        align-items: end;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 0.875rem;
        font-weight: 600;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: transparent;
        color: var(--text);
        font: inherit;
      }

      input {
        height: 42px;
        padding: 0 12px;
      }

      button {
        height: 42px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.68;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin: 20px 0;
      }

      .metric {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .metric strong {
        display: block;
        margin-top: 4px;
        font-size: 1.5rem;
        line-height: 1.2;
      }

      .output {
        display: grid;
        gap: 12px;
      }

      textarea {
        min-height: 160px;
        resize: vertical;
        padding: 12px;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 0.86rem;
        line-height: 1.45;
      }

      .status {
        min-height: 24px;
        margin-top: 16px;
        color: var(--muted);
      }

      .status[data-kind="error"] {
        color: var(--danger);
      }

      @media (max-width: 720px) {
        main {
          margin: 24px auto;
        }

        .controls,
        .metrics {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Plonk proof benchmark</h1>
        <p>Run the test circuit in WebAssembly and measure proof generation and verification time in this browser.</p>
      </header>

      <section class="panel" aria-label="Proof benchmark">
        <div class="controls">
          <label>
            Left
            <input id="left" type="number" min="0" step="1" value="13">
          </label>
          <label>
            Right
            <input id="right" type="number" min="0" step="1" value="17">
          </label>
          <button id="prove" type="button">Compute and verify proof</button>
        </div>

        <div class="metrics" aria-live="polite">
          <div class="metric">
            <span>Proof time</span>
            <strong id="proof-time">-</strong>
          </div>
          <div class="metric">
            <span>Public product</span>
            <strong id="product">-</strong>
          </div>
          <div class="metric">
            <span>Verify time</span>
            <strong id="verify-time">-</strong>
          </div>
          <div class="metric">
            <span>Proof size</span>
            <strong id="proof-size">-</strong>
          </div>
        </div>

        <div class="output">
          <label>
            Proof hex
            <textarea id="proof" readonly spellcheck="false"></textarea>
          </label>
          <label>
            Public inputs hex
            <textarea id="public-inputs" readonly spellcheck="false"></textarea>
          </label>
        </div>

        <p id="status" class="status"></p>
      </section>
    </main>

    <script type="module">
      import { loadPlonkJs } from "../../plonkjs/src/index.mjs";

      const wasmPath = new URL("../../plonkjs/dist/plonkwasm.wasm", import.meta.url);
      const keysPath = new URL("../../target/integration-test-fixtures/test-keys.json", import.meta.url);
      const proveButton = document.querySelector("#prove");
      const leftInput = document.querySelector("#left");
      const rightInput = document.querySelector("#right");
      const proofTime = document.querySelector("#proof-time");
      const verifyTime = document.querySelector("#verify-time");
      const productOutput = document.querySelector("#product");
      const proofSize = document.querySelector("#proof-size");
      const proofOutput = document.querySelector("#proof");
      const publicInputsOutput = document.querySelector("#public-inputs");
      const statusOutput = document.querySelector("#status");

      let sdkPromise;
      let keysPromise;

      proveButton.addEventListener("click", async () => {
        proveButton.disabled = true;
        statusOutput.dataset.kind = "";
        statusOutput.textContent = "Preparing benchmark...";
        proofTime.textContent = "-";
        verifyTime.textContent = "-";
        proofSize.textContent = "-";
        proofOutput.value = "";
        publicInputsOutput.value = "";

        try {
          const left = readInteger(leftInput, "left");
          const right = readInteger(rightInput, "right");
          const [sdk, keys] = await Promise.all([loadSdk(), loadKeys()]);
          const seed = new Uint8Array(32).fill(9);

          statusOutput.textContent = "Computing proof...";
          await new Promise((resolve) => requestAnimationFrame(resolve));

          const startedAt = performance.now();
          const proof = await sdk.prove(keys.prover_key_hex, {
            seed,
            inputs: { left, right }
          });
          const elapsedMs = performance.now() - startedAt;

          proofTime.textContent = `${elapsedMs.toFixed(2)} ms`;
          productOutput.textContent = String(left * right);
          proofSize.textContent = `${proof.proof.length} bytes`;
          proofOutput.value = proof.proofHex;
          publicInputsOutput.value = proof.publicInputsHex;

          statusOutput.textContent = "Verifying proof...";
          await new Promise((resolve) => requestAnimationFrame(resolve));

          const verifyStartedAt = performance.now();
          const verified = await sdk.verify(
            keys.verifier_key_hex,
            proof.proof,
            proof.publicInputs
          );
          const verifyElapsedMs = performance.now() - verifyStartedAt;

          verifyTime.textContent = `${verifyElapsedMs.toFixed(2)} ms`;
          statusOutput.textContent = verified
            ? "Proof computed and verified."
            : "Proof computed but verification failed.";
        } catch (error) {
          statusOutput.dataset.kind = "error";
          statusOutput.textContent = error instanceof Error ? error.message : String(error);
        } finally {
          proveButton.disabled = false;
        }
      });

      function loadSdk() {
        sdkPromise ??= loadPlonkJs({ wasmPath });
        return sdkPromise;
      }

      async function loadKeys() {
        keysPromise ??= fetch(keysPath).then(async (response) => {
          if (!response.ok) {
            throw new Error(
              "Could not load test keys. Run `cargo test --workspace` from the repo root and serve the repo over HTTP."
            );
          }
          return response.json();
        });
        return keysPromise;
      }

      function readInteger(input, name) {
        const value = Number(input.value);
        if (!Number.isSafeInteger(value) || value < 0) {
          throw new Error(`${name} must be a non-negative safe integer`);
        }
        return value;
      }
    </script>
  </body>
</html>
